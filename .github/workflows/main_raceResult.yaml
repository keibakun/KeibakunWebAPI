name: 【手動】レース結果取得
run-name: 【手動】レース結果取得 ${{ github.event.inputs.raceId != '' && github.event.inputs.raceId || format('{0}年{1}月', github.event.inputs.year, github.event.inputs.month) }}

on:
  workflow_dispatch:
    inputs:
      raceId:
        description: "取得対象の raceId を入力（指定した場合、年月は無視されます）"
        required: false
        default: ""

      year:
        description: "取得対象の年を入力（raceId 未指定時に使用）"
        required: false
        default: "2025"

      month:
        description: "取得対象の月を入力（raceId 未指定時に使用）"
        required: false
        default: "5"

jobs:
  scrape:
    name: scrape
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Ensure RaceResult directory exists
        run: |
          mkdir -p ./RaceResult

      - name: Install Chromium and libs (for Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser ca-certificates fonts-liberation libasound2 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libnspr4 libnss3 libxss1 libgbm1
          which chromium-browser || true

      - name: scrape netkeiba_raceResult
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          PUPPETEER_HEADLESS: new
        run: |
          npm install
          if [ -n "${{ github.event.inputs.raceId }}" ]; then
            npx tsx ./src/NKScraper/main_raceResult.ts ${{ github.event.inputs.raceId }}
          else
            npx tsx ./src/NKScraper/main_raceResult.ts ${{ github.event.inputs.year }} ${{ github.event.inputs.month }}
          fi
          ls ./RaceResult || echo "RaceList directory is empty"
          cat ./RaceResult/index.html || echo "index.html not found"

      - name: Setup Git user
        shell: bash
        run: |
          pwd
          git config --global user.email "keibakun.manage@gmail.com"
          git config --global user.name "keibakun"

      - name: Push RaceResult
        run: |
          for i in 1 2 3; do
            git pull --rebase --autostash origin main
            git add ./RaceResult/
            git diff --staged --exit-code && break
            git commit -m "下記期間のレース結果データを取得しました\n${{ github.event.inputs.raceId != '' && github.event.inputs.raceId || format('{0}年{1}月', github.event.inputs.year, github.event.inputs.month) }}" || true
            git push origin main && break
            echo "Push failed (attempt $i), retrying..."
            sleep $((RANDOM % 10 + 5))
          done

  report:
    needs: [scrape]
    if: always()
    permissions:
      contents: write
    uses: ./.github/workflows/actions-report.yml
    with:
      workflow-name: '【手動】レース結果取得'
      conclusion: ${{ needs.scrape.result }}