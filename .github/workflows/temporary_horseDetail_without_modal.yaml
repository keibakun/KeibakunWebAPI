          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Ensure directories exist
        run: |
          mkdir -p ./HorseDetail
          mkdir -p ./temp/work/workPool/horseDetail
          mkdir -p ./Log/HorseDetail

      - name: Install Google Chrome (for Puppeteer)
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
