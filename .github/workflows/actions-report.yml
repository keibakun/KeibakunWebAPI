name: Actions Report

on:
  workflow_call:
    inputs:
      workflow-name:
        description: 'レポート対象のワークフロー名'
        required: true
        type: string
      conclusion:
        description: '先行ジョブの結果 (success / failure / cancelled)'
        required: true
        type: string

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate report
        run: |
          CONCLUSION="${{ inputs.conclusion }}"
          if [ "$CONCLUSION" = "success" ]; then
            npx tsx src/ActionsReport/generateReport.ts "${{ inputs.workflow-name }}" 0 "Actions Complete"
          elif [ "$CONCLUSION" = "cancelled" ]; then
            npx tsx src/ActionsReport/generateReport.ts "${{ inputs.workflow-name }}" 1 "Job was cancelled or timed out"
          else
            npx tsx src/ActionsReport/generateReport.ts "${{ inputs.workflow-name }}" 1 "Job conclusion: $CONCLUSION"
          fi

      - name: Commit and push report
        run: |
          git config user.name "keibakun"
          git config user.email "keibakun.manage@gmail.com"
          git pull --rebase || true
          git add ActionsReport/
          git diff --staged --exit-code || (
            git commit -m "ActionsReport: ${{ inputs.workflow-name }}" && git push
          )
