name: 【本番】出馬表取得
run-name: production shutuba run
on:
  schedule:
    # JST 20:00 は UTC 11:00 のため、金曜〜月曜を UTC11:00 に設定
    - cron: '0 11 * * 5' # 金
    - cron: '0 11 * * 6' # 土
    - cron: '0 11 * * 0' # 日
    - cron: '0 11 * * 1' # 月
  workflow_dispatch: {}

jobs:
  scrape:
    name: scrape
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Ensure Shutuba directory exists
        run: |
          mkdir -p ./Shutuba

      - name: Run production shutuba (use run-time year-month)
        run: |
          npm install
          # compute JST year-month (yyyymm)
          YYYMM=$(TZ=Asia/Tokyo date +%Y%m)
          echo "Run for yyyymm: ${YYYMM} (JST)"
          # randomize start time within the hour: sleep 0..3599 seconds
          SLEEP=$((RANDOM % 3600))
          echo "Random sleep for ${SLEEP} seconds to randomize start time within the hour"
          sleep ${SLEEP}
          npx tsx ./src/NKScraper/main_shutuba.ts ${YYYMM}
          ls -R ./Shutuba || echo "Shutuba directory is empty"

      - name: Setup Git user
        shell: bash
        run: |
          git config --global user.email "keibakun.manage@gmail.com"
          git config --global user.name "keibakun"

      - name: Push Shutuba
        run: |
          # use JST date for commit metadata
          YYYMM=$(TZ=Asia/Tokyo date +%Y%m)
          git add ./Shutuba/
          git diff --staged --exit-code || (
            git commit -m "本番実行: 出馬表データを取得しました ${YYYMM}" && git push
          )

  report:
    needs: [scrape]
    if: always()
    uses: ./.github/workflows/actions-report.yml
    with:
      workflow-name: '【本番】出馬表取得'
      conclusion: ${{ needs.scrape.result }}
