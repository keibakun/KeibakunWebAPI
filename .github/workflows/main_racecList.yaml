name: 【手動】レースリスト取得
on:
  workflow_dispatch:
    inputs:
      year:
        description: "取得対象の年を入力"
        required: true
        default: "2025"
      month:
        description: "取得対象の月を入力"
        required: true
        default: "5"

concurrency:
  group: race-list-scrape
  cancel-in-progress: false

jobs:
  scrape:
    name: scrape
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Ensure RaceList directory exists
        run: |
          mkdir -p ./RaceList

      - name: scrape netkeiba_raceList
        run: |
          npm install
          npx tsx ./src/NKScraper/main_raceList.ts ${{ github.event.inputs.year }} ${{ github.event.inputs.month }} --limit 1000 --offset 0
          ls ./RaceList || echo "RaceList directory is empty"
          cat ./RaceList/index.html || echo "index.html not found"

      - name: Setup Git user
        shell: bash
        run: |
          pwd
          git config --global user.email "keibakun.manage@gmail.com"
          git config --global user.name "keibakun"

      - name: Push RaceList
        run: |
          for i in 1 2 3; do
            git pull --rebase --autostash origin main
            git add ./RaceList/
            git diff --staged --exit-code && break
            git commit -m "レースリストデータを取得しました ${{ github.event.inputs.year }}年${{ github.event.inputs.month }}月" || true
            git push origin main && break
            echo "Push failed (attempt $i), retrying..."
            sleep $((RANDOM % 10 + 5))
          done

  report:
    needs: [scrape]
    if: always()
    permissions:
      contents: write
    uses: ./.github/workflows/actions-report.yml
    with:
      workflow-name: '【手動】レースリスト取得'
      conclusion: ${{ needs.scrape.result }}