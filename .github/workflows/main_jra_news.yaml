name: '【本番】JRAニュース取得'

on:
  schedule:
    - cron: '0 0-9 * * *'
  workflow_dispatch: {}

concurrency:
  group: jra-news-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run JRA News scraper
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: npx tsx src/JRAScraper/main_JraNews.ts
      
      - name: Setup Git user
        shell: bash
        run: |
          pwd
          git config --global user.email "keibakun.manage@gmail.com"
          git config --global user.name "keibakun"

      - name: Push JRANews
        run: |
          # use JST date for commit metadata
          YYYMM=$(TZ=Asia/Tokyo date +%Y%m)
          git add ./JRANews/
          git diff --staged --exit-code || (
            git commit -m "本番実行: JRAニュースを取得しました ${YYYMM}" && git push
          )