name: 【手動】出馬表取得
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on:
  workflow_dispatch:
    inputs:
      year:
        description: "取得対象の年を入力"
        required: true
        default: "2025"

      month:
        description: "取得対象の月を入力"
        required: true
        default: "5"
      
      debug:
        description: "デバッグ用フラグ（true/false）。手動実行の際は原則デフォルト値を変更しないでください。"
        required: false
        default: "true"

jobs:
  scrape:
    name: scrape
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Ensure Shutuba directory exists
        run: |
          mkdir -p ./Shutuba

      - name: scrape netkeiba_shutuba
        run: |
          npm install
          npx tsx ./src/NKScraper/main_shutuba.ts ${{ github.event.inputs.year }} ${{ github.event.inputs.month }} ${{ github.event.inputs.debug }}
          ls -R ./Shutuba || echo "Shutuba directory is empty"

      - name: Setup Git user
        shell: bash
        run: |
          pwd
          git config --global user.email "keibakun.manage@gmail.com"
          git config --global user.name "keibakun"

      - name: Push Shutuba
        run: |
          # Ensure local is up-to-date before committing
          git pull --rebase --autostash origin main
          git add ./Shutuba/
          git diff --staged --exit-code || (
            git commit -m "デバッグモードで下記期間の出馬表データを取得しました\n${{ github.event.inputs.year }}年${{ github.event.inputs.month }}月" && git push origin main
          )

  report:
    needs: [scrape]
    if: always()
    permissions:
      contents: write
    uses: ./.github/workflows/actions-report.yml
    with:
      workflow-name: '【手動】出馬表取得'
      conclusion: ${{ needs.scrape.result }}